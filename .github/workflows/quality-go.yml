name: "Quality Gate: Go"

on:
  workflow_call:
    inputs:
      go-version:
        type: string
        default: "1.24"
      working-directory:
        type: string
        default: "."
      enable-race:
        type: boolean
        default: true
      test-tags:
        type: string
        default: ""

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - uses: golangci/golangci-lint-action@v7
        with:
          working-directory: ${{ inputs.working-directory }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - name: Test
        working-directory: ${{ inputs.working-directory }}
        run: |
          FLAGS="-count=1 -coverprofile=coverage.out"
          if [ "${{ inputs.enable-race }}" = "true" ]; then FLAGS="$FLAGS -race"; fi
          if [ -n "${{ inputs.test-tags }}" ]; then FLAGS="$FLAGS -tags ${{ inputs.test-tags }}"; fi
          go test $FLAGS ./...
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage
          path: ${{ inputs.working-directory }}/coverage.out
          retention-days: 14
